name: OpenLiberty Database Rotation

on:
  schedule:
    #At the end of every weekday
    - cron:  '0 0 * * 1-5'
  push:
    branches:
      -  github-actions
env:
  LANG: en_US.UTF-8
jobs:
  setup: 
    name: Setting Up Build
    runs-on: ubuntu-18.04
    outputs:
      test-matrix: ${{ steps.gen-params.outputs.test-matrix }}
      test-os: ${{ steps.gen-params.outputs.test-os }}
      test-java: ${{ steps.gen-params.outputs.test-java }}
      test-database: ${{ steps.gen-params.outputs.test-database }}
    steps:
    - uses: actions/checkout@v2
    - name: Set up Java
      uses: joschi/setup-jdk@v2
      with:
        java-version: 11
        openjdk_impl: openj9
    - name: Generate build parameters
      id: gen-params
      env:
        PRBODY: ${{ github.event.pull_request.body }}
      run: .github/workflow-scripts/generate-params.sh
  build: #Main build always done on linix run in parallel to setup and unit-test
    name: Build Open Liberty
    runs-on: ubuntu-18.04
    steps:
    - uses: actions/checkout@v2
      with:
        repository: 'OpenLiberty/open-liberty'
        ref: 'master'
        fetch-depth: 50
    - name: Set up Java
      uses: joschi/setup-jdk@v2
      with:
        java-version: 11
        openjdk_impl: openj9
    - name: Apply Gradle cache
      uses: actions/cache@v2
      with:
        path: |
          ~/.gradle/caches/modules-2
          !~/.gradle/caches/modules-2/io.openliberty*
          !~/.gradle/caches/modules-2/com.ibm.w*
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Apply Maven cache
      uses: actions/cache@v2
      with:
        path: |
          ~/.m2/repository/
          !~/.m2/repository/io/openliberty
          !~/.m2/repository/com/ibm/w*
        key: ${{ runner.os }}-maven-${{ hashFiles('**/*.maven') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Build with Gradle
      run: |
        cd dev
        chmod +x gradlew
        echo "::group::Building Liberty.  This will take approx. 30 minutes"
        ./gradlew cnf:initialize assemble
        echo "::endgroup::"
        cd .. && zip -rq openliberty-image.zip dev/build.image/wlp/
    - name: Upload liberty image
      uses: actions/upload-artifact@v2
      with:
        name: openliberty-image
        if-no-files-found: error
        path: openliberty-image.zip
  fat_tests: #Runs parallel jobs for each FAT category. JDK version and OS are dependent on setup
    name: FAT Tests - ${{matrix.category}} and ${{matrix.database}}
    needs: [setup, build]
    runs-on: ${{ needs.setup.outputs.test-os }}
    strategy:
      fail-fast: false
      max-parallel: 19
      matrix: ${{fromJson(needs.setup.outputs.test-database)}}
    steps:
    - uses: actions/checkout@v2
      with:
        repository: 'OpenLiberty/open-liberty'
        ref: 'master'
        fetch-depth: 50
    - name: Reclaim disk space
      run: .github/workflow-scripts/reclaim-disk-space.sh
    - name: Set up Java
      uses: joschi/setup-jdk@v2
      with:
        java-version: ${{ needs.setup.outputs.test-java }}
        openjdk_impl: openj9
    - name: Apply Gradle cache
      uses: actions/cache@v2
      with:
        path: |
          ~/.gradle/caches/modules-2
          !~/.gradle/caches/modules-2/io.openliberty*
          !~/.gradle/caches/modules-2/com.ibm.w*
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Apply Maven cache
      uses: actions/cache@v2
      with:
        path: |
          ~/.m2/repository/
          !~/.m2/repository/io/openliberty
          !~/.m2/repository/com/ibm/w*
        key: ${{ runner.os }}-maven-${{ hashFiles('**/*.maven') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Download liberty image
      uses: actions/download-artifact@v2
      with:
        name: openliberty-image
    - name: Run FAT buckets
      timeout-minutes: 150
      shell: bash
      env:
        CATEGORY: ${{matrix.category}}
        FAT_ARGS: "-Dfat.bucket.db.type=${{matrix.database}} -Dfat.test.databases.only=true"
        GH_EVENT_NAME: ${{github.event_name}}
      run: .github/workflow-scripts/run-fat-build.sh
    - name: Check for FAT failures
      id: check-fat-failure
      shell: bash
      env:
        CATEGORY: ${{matrix.category}}
      run: .github/workflow-scripts/check-fat-failures.sh
    - name: Upload failing FAT artifacts
      if: steps.check-fat-failure.outputs.status == 'failure'
      uses: aguibert/upload-artifact@v1.0
      with:
        name: ${{matrix.category}}
        path: dev/failing_buckets/*.zip
        single-archive: "false"
    - name: Analyze junit output
      if: steps.check-fat-failure.outputs.status == 'failure'
      uses: KyleAure/junit-report-annotations-action@1.6
      with:
        name: ${{matrix.category}} report
        path: "dev/fat-results/TEST-*.xml"        
        includeSummary: false
        numFailures: 100 # Truncate number of failures so we don't run out of annoations.